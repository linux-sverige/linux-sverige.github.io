<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2c5282"/>
    </linearGradient>
  </defs>
  <rect width="1128" height="191" fill="url(#bg)"/>
  
  <!-- Left accent -->
  <rect x="0" y="0" width="8" height="191" fill="#ffb800"/>
  
  <!-- Penguin icon -->
  <g transform="translate(30, 20) scale(0.4)">
    <ellipse cx="200" cy="240" rx="80" ry="100" fill="#1a1a1a"/>
    <ellipse cx="200" cy="250" rx="50" ry="70" fill="#ffffff"/>
    <circle cx="200" cy="130" r="60" fill="#1a1a1a"/>
    <circle cx="175" cy="120" r="12" fill="#ffffff"/>
    <circle cx="225" cy="120" r="12" fill="#ffffff"/>
    <circle cx="178" cy="122" r="6" fill="#000000"/>
    <circle cx="228" cy="122" r="6" fill="#000000"/>
    <polygon points="200,140 185,165 215,165" fill="#ffb800"/>
    <ellipse cx="130" cy="220" rx="25" ry="50" fill="#1a1a1a" transform="rotate(-20 130 220)"/>
    <ellipse cx="270" cy="220" rx="25" ry="50" fill="#1a1a1a" transform="rotate(20 270 220)"/>
    <ellipse cx="165" cy="340" rx="30" ry="15" fill="#ffb800"/>
    <ellipse cx="235" cy="340" rx="30" ry="15" fill="#ffb800"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">Linux Sverige</text>
  <text x="200" y="130" font-family="Arial, sans-serif" font-size="24" fill="#ffb800">🐧 Digital suveränitet för Sverige</text>
  
  <!-- Swedish flag accent -->
  <g transform="translate(950, 60)">
    <rect x="0" y="0" width="120" height="72" fill="#006aa7"/>
    <rect x="32" y="0" width="24" height="72" fill="#fecc00"/>
    <rect x="0" y="27" width="120" height="18" fill="#fecc00"/>
  </g>
  
  <!-- Bottom tagline -->
  <text x="200" y="170" font-family="Arial, sans-serif" font-size="16" fill="#aaaaaa">linux-sverige.github.io | @LinuxSverige</text>
</svg>