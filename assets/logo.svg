<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" rx="50" fill="#1e3a5f"/>
  
  <!-- Penguin body -->
  <ellipse cx="200" cy="240" rx="80" ry="100" fill="#1a1a1a"/>
  
  <!-- White belly -->
  <ellipse cx="200" cy="250" rx="50" ry="70" fill="#ffffff"/>
  
  <!-- Head -->
  <circle cx="200" cy="130" r="60" fill="#1a1a1a"/>
  
  <!-- Eyes -->
  <circle cx="175" cy="120" r="12" fill="#ffffff"/>
  <circle cx="225" cy="120" r="12" fill="#ffffff"/>
  <circle cx="178" cy="122" r="6" fill="#000000"/>
  <circle cx="228" cy="122" r="6" fill="#000000"/>
  
  <!-- Beak -->
  <polygon points="200,140 185,165 215,165" fill="#ffb800"/>
  
  <!-- Flippers -->
  <ellipse cx="130" cy="220" rx="25" ry="50" fill="#1a1a1a" transform="rotate(-20 130 220)"/>
  <ellipse cx="270" cy="220" rx="25" ry="50" fill="#1a1a1a" transform="rotate(20 270 220)"/>
  
  <!-- Feet -->
  <ellipse cx="165" cy="340" rx="30" ry="15" fill="#ffb800"/>
  <ellipse cx="235" cy="340" rx="30" ry="15" fill="#ffb800"/>
  
  <!-- Swedish flag on belly -->
  <rect x="175" y="200" width="50" height="35" fill="#006aa7"/>
  <rect x="190" y="200" width="10" height="35" fill="#fecc00"/>
  <rect x="175" y="212" width="50" height="10" fill="#fecc00"/>
  
  <!-- Text -->
  <text x="200" y="380" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">Linux Sverige</text>
</svg>