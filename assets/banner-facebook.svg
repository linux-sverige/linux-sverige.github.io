<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f2440"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="530" r="200" fill="#2c5282" opacity="0.3"/>
  <circle cx="1100" cy="100" r="150" fill="#2c5282" opacity="0.3"/>
  
  <!-- Left accent bar -->
  <rect x="0" y="0" width="15" height="630" fill="#ffb800"/>
  
  <!-- Large penguin -->
  <g transform="translate(100, 130) scale(1.5)">
    <ellipse cx="200" cy="240" rx="80" ry="100" fill="#1a1a1a"/>
    <ellipse cx="200" cy="250" rx="50" ry="70" fill="#ffffff"/>
    <circle cx="200" cy="130" r="60" fill="#1a1a1a"/>
    <circle cx="175" cy="120" r="12" fill="#ffffff"/>
    <circle cx="225" cy="120" r="12" fill="#ffffff"/>
    <circle cx="178" cy="122" r="6" fill="#000000"/>
    <circle cx="228" cy="122" r="6" fill="#000000"/>
    <polygon points="200,140 185,165 215,165" fill="#ffb800"/>
    <ellipse cx="130" cy="220" rx="25" ry="50" fill="#1a1a1a" transform="rotate(-20 130 220)"/>
    <ellipse cx="270" cy="220" rx="25" ry="50" fill="#1a1a1a" transform="rotate(20 270 220)"/>
    <ellipse cx="165" cy="340" rx="30" ry="15" fill="#ffb800"/>
    <ellipse cx="235" cy="340" rx="30" ry="15" fill="#ffb800"/>
    
    <!-- Swedish flag on belly -->
    <rect x="175" y="200" width="50" height="35" fill="#006aa7"/>
    <rect x="190" y="200" width="10" height="35" fill="#fecc00"/>
    <rect x="175" y="212" width="50" height="10" fill="#fecc00"/>
  </g>
  
  <!-- Main text -->
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">Linux Sverige</text>
  
  <!-- Tagline -->
  <text x="600" y="330" font-family="Arial, sans-serif" font-size="32" fill="#ffb800">🐧 Digital suveränitet för Sverige</text>
  
  <!-- Stats -->
  <g transform="translate(600, 400)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="24" fill="#ffffff">🇫🇷 Frankrike migrerar 2,5 miljoner datorer</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="24" fill="#ffffff">💰 Sparar €500 miljoner årligen</text>
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="24" fill="#ffffff">🇸🇪 Dags för Sverige att göra samma sak</text>
  </g>
  
  <!-- Call to action -->
  <rect x="600" y="510" width="280" height="60" rx="30" fill="#ffb800"/>
  <text x="740" y="550" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e3a5f" text-anchor="middle">Gå med nu! →</text>
  
  <!-- URL -->
  <text x="600" y="600" font-family="Arial, sans-serif" font-size="20" fill="#aaaaaa">linux-sverige.github.io</text>
  
  <!-- Swedish flag (top right) -->
  <g transform="translate(1050, 30)">
    <rect x="0" y="0" width="120" height="72" fill="#006aa7"/>
    <rect x="32" y="0" width="24" height="72" fill="#fecc00"/>
    <rect x="0" y="27" width="120" height="18" fill="#fecc00"/>
  </g>
</svg>